name: Сборка
on:
  push:
jobs:
  build-test:
    name: Test context
    runs-on: ubuntu-cloud-runner
    steps:
      - uses: actions/checkout@v3 # Checkout the repository code
      - name: Make gradle executable
        run: chmod +x gradlew
      - name: Java version
        run: java --version
      - name: Build
        run: ./gradlew build