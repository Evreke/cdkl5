name: Сборка
on:
  push:
jobs:
  build-test:
    name: Test context
    runs-on: ubuntu-cloud-runner
    steps:
      - uses: actions/checkout@v3  # Checkout the repository code

      - name: Install jdk
        run: |
          apt-get update
          apt-get -y install default-jdk

      - name: Build
        run: |
          ./gradlew build