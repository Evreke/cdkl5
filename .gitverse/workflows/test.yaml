name: Сборка
on:
  push:
jobs:
  build-test:
    name: Test context
    runs-on: ubuntu-cloud-runner
    container:
      gradle:jdk17-alpine
    steps:
      - name: Install Node.js (Alpine)
        run: apk add --no-cache nodejs npm  # Alpine uses `apk`
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: |
          ./gradlew build