name: Сборка
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'  # Faster builds

      - name: Build
        run: |
          ./gradlew build

      - name: Prepare Docker artifacts
        run: |
          mkdir -p /tmp/artifacts
          cp build/libs/cdkl5-all.jar /tmp/artifacts/app.jar
          cp Dockerfile /tmp/artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.0.0
        with:
          name: app-artifacts
          path: /tmp/artifacts/*

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4.0.0
        with:
          name: app-artifacts

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
      - name: Copy files via SCP
        run: |
          scp -r -P ${{ secrets.REMOTE_PORT }} ./artifacts ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/${{ secrets.REMOTE_USER }}/cdkl5

      - name: SSH into the server and run commands
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'EOF'
          set -e
          echo "=== Starting deployment ==="
          
          # Navigate to project directory
          echo "Changing to project directory..."
          cd /cdkl5 || { echo "Failed to change directory"; exit 1; }
          
          echo "Copying JAR..."
          cp /home/${{ secrets.REMOTE_USER }}/deploy/cdkl5-all.jar ./app.jar || { echo "Failed to copy JAR"; exit 1; }
          
          # Rebuild and restart container
          echo "Rebuilding and restarting Docker container..."
          docker compose build --no-cache cdkl && \
          docker compose up -d --force-recreate --no-deps cdkl || { echo "Docker commands failed"; exit 1; }
          
          echo "Verifying container status..."
          docker ps --filter "name=cdkl" --format "{{.Status}}" | grep -q "Up" || { echo "Container not running"; exit 1; }
          
          echo "=== Deployment successful ==="
          EOF